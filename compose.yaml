services:
  db:
    image: postgres:18
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - ./.env
    ports:
      - ${POSTGRES_PORT}:5432
  backend:
    build:
      context: ./b
    env_file:
      - ./.env
    ports:
      - "8080:8000"
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build:
      context: ./f
    ports:
      - 5173:5173
    
